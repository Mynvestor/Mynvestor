    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mynvestor - Forgot Password</title>
    <!-- Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, rgba(240, 244, 248, 0.9) 0%, rgba(217, 226, 236, 0.9) 100%), 
                        url('logos/bakgraund.jpeg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            color: #333;
        }
        .highlight {
            color: #27a844;
        }
        .forgot-password-container {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .forgot-password-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .form-input {
            background: #ffffff;
            border: 1px solid #d1d5db;
            color: #333;
            font-weight: 500;
        }
        .form-input::placeholder {
            color: #9ca3af;
        }
        .form-input:focus {
            border-color: #27a844;
            box-shadow: none;
            background: #ffffff;
            color: #333;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            display: none;
            margin-top: 0.25rem;
        }
        .secure-note i {
            color: #27a844;
        }
        .note {
            color: #9ca3af;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1rem;
        }
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(100px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 100;
        }
        .toast.success {
            background-color: #27a844;
        }
        .toast.error {
            background-color: #ef4444;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast .bi-check-circle,
        .toast .bi-exclamation-circle {
            margin-right: 0.5rem;
            font-size: 1.25rem;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center text-gray-800">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P2MFR6QP"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <div class="forgot-password-container bg-white bg-opacity-80 rounded-2xl p-6 md:p-8 shadow-2xl max-w-md w-full mx-4">
        <!-- Logo and Header -->
        <div class="text-center mb-6">
            <img src="logos/omni.png" alt="Mynvestor Logo" class="mx-auto w-24 mb-4">
            <h1 class="text-3xl font-bold"><span class="highlight">Myn</span>vestor</h1>
            <p class="text-gray-600 mt-2">Reset Your Password</p>
        </div>

        <!-- Form -->
        <form id="forgotPasswordForm">
            <div class="mb-4">
                <label for="resetEmail" class="block text-sm font-medium text-gray-600">Email Address</label>
                <input type="email" class="form-input w-full mt-1 p-2 rounded-lg" id="resetEmail" placeholder="Enter your email" required>
                <div class="error-message" id="resetEmailError">Please enter a valid email address.</div>
            </div>
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-full transition duration-300 w-full flex items-center justify-center text-sm">
                Send Reset Link <i class="bi bi-envelope ml-2"></i>
            </button>
            <p class="secure-note text-gray-600 text-center mt-4 text-sm"><i class="bi bi-shield-lock mr-1"></i>Your data is protected with advanced encryption.</p>
            <p class="note"><strong>Note:</strong> Check your inbox (and spam folder) for the reset link.</p>
        </form>

        <!-- Back to Login Link -->
        <p class="text-center mt-4 text-sm">
            <a href="login.html" class="text-green-600 hover:text-green-700">Back to Sign In</a>
        </p>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i id="toastIcon" class="bi"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // Function to show toast notification
        function showToast(message, type = 'success', duration = 3000) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            // Set message and icon
            toastMessage.textContent = message;
            toastIcon.className = `bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'}`;

            // Set toast type (success or error)
            toast.className = `toast ${type} show`;

            // Hide toast after duration
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();
            const emailError = document.getElementById('resetEmailError');

            emailError.style.display = 'none';

            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                emailError.style.display = 'block';
                return;
            }

            // Simulate sending reset link
            showToast(`Password reset link sent to ${email}. Please check your inbox.`, 'success');
            this.reset();

            // Redirect to login after toast
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 3000);
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
