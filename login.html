<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mynvestor - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .brand-header {
            text-align: center;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .brand-logo {
            max-width: 80px;
            margin-bottom: 1rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .brand-title {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        .brand-title span.jon {
            color: #28a745;
        }

        .form-control {
            background: #454e55;
            border: 1px solid #495057;
            color: white;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: #454e55;
            border-color: #28a745;
            box-shadow: none;
            color: white;
        }

        .btn-login {
            background: #28a745;
            border: none;
            padding: 0.75rem;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #218838;
        }

        body {
            background: #001f3f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 0 15px;
        }

        .text-muted {
            color: #adb5bd !important;
        }

        .additional-links a {
            color: #d0d4d6;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .additional-links a:hover {
            color: #28a745;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="brand-header">
            <img src="omni.png" alt="Company Logo" class="brand-logo">
            <div class="brand-title">
                <span class="jon">Myn</span>vestor
            </div>
            <small class="text-muted">Investing Made Simple and Clear</small>
        </div>

        <form id="loginForm" class="p-4">
            <div class="mb-3">
                <label for="email" class="form-label text-white">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label text-white">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-login text-white">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </div>

            <div class="additional-links d-flex justify-content-between">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-muted" for="remember">
                        Remember me
                    </label>
                </div>
                <a href="#forgot-password">Forgot Password?</a>
            </div>
        </form>

        <div class="text-center mt-4 text-muted">
            Don't have an account? <a href="step1.html" class="text-decoration-none">Create Account</a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container">
        <div id="loginToast" class="toast bg-dark text-white" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-body">
                <span id="toastMessage"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(email && password) {
                showToast('Login successful! Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showToast('Please fill in all fields');
            }
        });

        function showToast(message) {
            const toast = new bootstrap.Toast(document.getElementById('loginToast'));
            document.getElementById('toastMessage').textContent = message;
            toast.show();
            setTimeout(() => toast.hide(), 3000);
        }
    </script>
</body>
</html>
