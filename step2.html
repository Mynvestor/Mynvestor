<!-- signup2.html - Document Upload -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mynvestor - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #454e55;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 0 15px;
        }

        .login-card {
            background: #343a40;
            border: 1px solid #495057;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .brand-header {
            text-align: center;
            padding: 2rem;
            border-bottom: 1px solid #495057;
        }

        .brand-title {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        .brand-title span.jon {
            color: #28a745;
        }

        .form-control {
            background: #454e55;
            border: 1px solid #495057;
            color: white;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: #454e55;
            border-color: #28a745;
            box-shadow: none;
            color: white;
        }

        .btn-login {
            background: #28a745;
            border: none;
            padding: 0.75rem;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #218838;
        }

        .additional-links a {
            color: #d0d4d6;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .additional-links a:hover {
            color: #28a745;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Progress Indicator -->
            <div class="px-4 pt-4">
                <div class="d-flex justify-content-between mb-3">
                    <small class="text-muted">Step 2 of 3</small>
                    <small class="text-muted">Document Upload</small>
                </div>
                <div class="progress" style="height: 4px;">
                    <div class="progress-bar" style="width: 66%"></div>
                </div>
            </div>

            <div class="p-4">
                <div class="upload-dropzone p-4 text-center mb-4">
                    <i class="bi bi-cloud-upload display-5 text-muted"></i>
                    <p class="text-muted mt-2">Drag & drop files here or click to upload</p>
                    <input type="file" hidden multiple>
                </div>

                <div class="step-card p-3 mb-3">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-file-pdf fs-4 text-danger me-3"></i>
                        <div>
                            <h6 class="mb-0 text-white">ID Document</h6>
                            <small class="text-muted">Upload government-issued ID</small>
                        </div>
                    </div>
                </div>

                <div class="step-card p-3 mb-3">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-image fs-4 text-success me-3"></i>
                        <div>
                            <h6 class="mb-0 text-white">Proof of Address</h6>
                            <small class="text-muted">Recent utility bill or bank statement</small>
                        </div>
                    </div>
                </div>

                <div class="step-card p-3 mb-4">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-person-badge fs-4 text-primary me-3"></i>
                        <div>
                            <h6 class="mb-0 text-white">Portrait Photo</h6>
                            <small class="text-muted">Clear front-facing photo</small>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a href="step1.html" class="btn btn-outline-secondary">Back</a>
                    <a href="step3.html" class="btn btn-login">Continue</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('.upload-dropzone').addEventListener('click', function() {
            this.querySelector('input[type="file"]').click();
        });

        document.querySelector('input[type="file"]').addEventListener('change', function(e) {
            const files = e.target.files;
            // Handle file upload logic here
        });
    </script>
</body>
</html>
