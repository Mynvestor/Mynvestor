    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mynvestor - Sign Up (Step 2)</title>
    <!-- Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, rgba(240, 244, 248, 0.9) 0%, rgba(217, 226, 236, 0.9) 100%), 
            url('logos/bakgraund.jpeg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            color: #333;
        }
        .highlight {
            color: #27a844;
        }
        .form-input {
            background: #ffffff;
            border: 1px solid #d1d5db;
            color: #333;
            font-weight: 500;
        }
        .form-input::placeholder {
            color: #9ca3af;
        }
        .form-input:focus {
            border-color: #27a844;
            box-shadow: none;
            background: #ffffff;
            color: #333;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            display: none;
            margin-top: 0.25rem;
        }
        .secure-note i {
            color: #27a844;
        }
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(100px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 100;
        }
        .toast.success {
            background-color: #27a844;
        }
        .toast.error {
            background-color: #ef4444;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast .bi-check-circle,
        .toast .bi-exclamation-circle {
            margin-right: 0.5rem;
            font-size: 1.25rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-800">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P2MFR6QP"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <div class="bg-white bg-opacity-80 rounded-2xl p-6 md:p-8 shadow-2xl max-w-md w-full mx-4 transform transition-transform hover:-translate-y-1 hover:shadow-2xl">
        <!-- Logo and Header -->
        <div class="text-center mb-6">
            <img src="logos/omni.png" alt="Mynvestor Logo" class="mx-auto w-24 mb-4">
            <h1 class="text-3xl font-bold"><span class="highlight">Myn</span>vestor</h1>
            <p class="text-gray-600 mt-2">Step 2: Contact Information</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
            <div class="bg-green-600 h-2 rounded-full" style="width: 66%;"></div>
        </div>

        <!-- Form -->
        <form id="signupStep2Form" action="https://formspree.io/f/xrbqkjgq" method="POST">
            <!-- Hidden Fields for Step 1 Data -->
            <input type="hidden" name="firstName" id="firstName">
            <input type="hidden" name="lastName" id="lastName">
            <input type="hidden" name="dob" id="dob">
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-600">Email Address</label>
                <input type="email" class="form-input w-full mt-1 p-2 rounded-lg" id="email" name="_replyto" placeholder="Enter email" required>
                <div class="error-message" id="emailError">Please enter a valid email address.</div>
            </div>
            <div class="mb-4">
                <label for="phone" class="block text-sm font-medium text-gray-600">Phone Number</label>
                <input type="tel" class="form-input w-full mt-1 p-2 rounded-lg" id="phone" name="phone" placeholder="Enter phone number" required>
                <div class="error-message" id="phoneError">Please enter a valid phone number (e.g., +265123456789).</div>
            </div>
            <input type="hidden" name="_subject" value="Signup Step 2 Submission from Mynvestor">
            <input type="hidden" name="_next" value="https://mynvestor.netlify.app/signup_step3.html">
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-full transition duration-300 w-full flex items-center justify-center text-sm">
                Continue to Step 3 <i class="bi bi-arrow-right ml-2"></i>
            </button>
            <p class="secure-note text-gray-600 text-center mt-4 text-sm"><i class="bi bi-shield-lock mr-1"></i>Your data is protected with advanced encryption.</p>
        </form>

        <!-- Login Link -->
        <p class="text-center mt-4 text-sm">
            <a href="login.html" class="text-green-600 hover:text-green-700">Already have an account? Sign in</a>
        </p>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i id="toastIcon" class="bi"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // Function to show toast notification
        function showToast(message, type = 'success', duration = 3000) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toastMessage.textContent = message;
            toastIcon.className = `bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'}`;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // Populate hidden fields with Step 1 data
        document.addEventListener('DOMContentLoaded', function() {
            const signupData = JSON.parse(sessionStorage.getItem('signupData') || '{}');
            document.getElementById('firstName').value = signupData.firstName || '';
            document.getElementById('lastName').value = signupData.lastName || '';
            document.getElementById('dob').value = signupData.dob || '';
        });

        document.getElementById('signupStep2Form').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Get form inputs
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            // Error elements
            const emailError = document.getElementById('emailError');
            const phoneError = document.getElementById('phoneError');

            // Reset error messages
            emailError.style.display = 'none';
            phoneError.style.display = 'none';

            // Validation
            let isValid = true;

            // Email validation
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailError.style.display = 'block';
                isValid = false;
            }

            // Phone validation (e.g., +265 followed by 9 digits)
            if (!/^\+265\d{9}$/.test(phone)) {
                phoneError.style.display = 'block';
                isValid = false;
            }

            if (isValid) {
                try {
                    const formData = new FormData(document.getElementById('signupStep2Form'));
                    const response = await fetch('https://formspree.io/f/xrbqkjgq', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'Accept': 'application/json',
                        },
                    });

                    if (response.ok) {
                        // Update signupData in sessionStorage
                        const signupData = JSON.parse(sessionStorage.getItem('signupData') || '{}');
                        signupData.email = email;
                        signupData.phone = phone;
                        sessionStorage.setItem('signupData', JSON.stringify(signupData));

                        showToast('Form Submitted Successfully!', 'success');
                        setTimeout(() => {
                            window.location.href = 'signup_step3.html';
                        }, 3000);
                    } else {
                        console.error('Form submission failed:', response.statusText);
                        showToast('Form submission failed. Please try again.', 'error');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('An error occurred. Please try again.', 'error');
                }
            }
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
