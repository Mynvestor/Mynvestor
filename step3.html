<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mynvestor - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #454e55;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 0 15px;
        }

        .login-card {
            background: #343a40;
            border: 1px solid #495057;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .brand-header {
            text-align: center;
            padding: 2rem;
            border-bottom: 1px solid #495057;
        }

        .brand-title {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        .brand-title span.jon {
            color: #28a745;
        }

        .form-control {
            background: #454e55;
            border: 1px solid #495057;
            color: white;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: #454e55;
            border-color: #28a745;
            box-shadow: none;
            color: white;
        }

        .btn-login {
            background: #28a745;
            border: none;
            padding: 0.75rem;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #218838;
        }

        .additional-links a {
            color: #d0d4d6;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .additional-links a:hover {
            color: #28a745;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<!-- signup3.html - Account Creation -->
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Progress Indicator -->
            <div class="px-4 pt-4">
                <div class="d-flex justify-content-between mb-3">
                    <small class="text-muted">Step 3 of 3</small>
                    <small class="text-muted">Account Setup</small>
                </div>
                <div class="progress" style="height: 4px;">
                    <div class="progress-bar" style="width: 100%"></div>
                </div>
            </div>

            <div class="p-4">
                <form id="accountForm">
                    <div class="mb-4">
                        <label class="form-label text-white">Choose Username</label>
                        <input type="text" class="form-control" required>
                        <small class="text-muted">Minimum 6 characters</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white">Create Password</label>
                        <input type="password" class="form-control" required>
                        <div class="password-strength">
                            <div class="progress-bar" style="width: 0"></div>
                        </div>
                        <small class="text-muted">Minimum 8 characters with mix of letters and numbers</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white">Confirm Password</label>
                        <input type="password" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2">
                        <a href="step2.html" class="btn btn-outline-secondary">Back</a>
                    <a href="login.html" class="btn btn-login">Continue</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('accountForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Add validation logic
            const password = document.querySelector('input[type="password"]');
            const confirmPassword = document.querySelectorAll('input[type="password"]')[1];

            if(password.value !== confirmPassword.value) {
                showToast('Passwords do not match');
                return;
            }

            // Simulated account creation
            showToast('Account created successfully! Redirecting...');
            setTimeout(() => window.location.href = 'index.html', 2000);
        });

        // Password strength indicator
        document.querySelector('input[type="password"]').addEventListener('input', function(e) {
            const strength = Math.min(e.target.value.length * 10, 100);
            document.querySelector('.password-strength .progress-bar').style.width = strength + '%';
        });
    </script>
</body>
</html>
